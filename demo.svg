<text class="ln" xml:space="preserve" x="18" y="88" fill="#c9d1d9" style="animation-delay:0.35s"># Changelog</text>
<text class="ln" xml:space="preserve" x="18" y="107" fill="#c9d1d9" style="animation-delay:0.47s"> </text>
<text class="ln" xml:space="preserve" x="18" y="126" fill="#c9d1d9" style="animation-delay:0.59s">All notable changes to this project are documented here.</text>
